# Sealed behavioral holdouts for the level-up "immediate-commit + session-as-record"
# redesign. The implementing agent MUST NOT read this file (sealed via sandbox deny).
# Each scenario encodes a v2 contract invariant as a check run against impl_root
# (the worldarchitect.ai repo). Scenarios fail on origin/main today and define the
# target end-state the implementation must reach.
#
# Design under test: roadmap/level-up-session-northstar-2026-06-11.md (v2).
# Only PASS/WARN/FAIL + scenario name flow back to the implementer.

feature: level-up-session
scenarios:
  # --- Consolidation: no pending state machine survives in production ------------
  - name: pending finish-commit reducer functions are not called in production
    eval:
      kind: shell
      # The 6 pending-lifecycle functions must be deleted/unwired. Allow defs in
      # level_up_session.py and any test; fail if a production module calls them.
      command: >
        ! grep -rnE "begin_finish_commit|complete_finish_commit|mark_finish_error"
        mvp_site --include=*.py
        | grep -vE "level_up_session.py|/tests?/|test_|_test"
        | grep -q .
      expect_exit: 0

  - name: STATUS_COMMITTING is not used to gate any production write path
    eval:
      kind: shell
      command: >
        ! grep -rn "STATUS_COMMITTING" mvp_site --include=*.py
        | grep -vE "level_up_session.py|/tests?/|test_|_test"
        | grep -q .
      expect_exit: 0

  # --- Divergence elimination: rewards_box carries no independent level ----------
  - name: rewards_box.new_level is never written as an independent lifecycle authority
    eval:
      kind: shell
      # No production assignment to rewards_box[...]=new_level / .new_level= outside
      # the one-way projector (project_legacy_level_up_fields).
      command: >
        ! grep -rnE "rewards_box\b.*\bnew_level\b\s*[:=]" mvp_site --include=*.py
        | grep -vE "level_up_session.py|project_legacy_level_up_fields|/tests?/|test_|_test"
        | grep -q .
      expect_exit: 0

  - name: a positive-form grep gate forbids direct legacy level-up field writes
    eval:
      kind: shell
      # field_ownership_registry must be enforced by a CI/script gate, not inert.
      command: >
        grep -rqlE "rewards_box.*(level_up_available|new_level)|custom_campaign_state.*level_up_"
        .github scripts 2>/dev/null
        && grep -rqil "field_ownership_registry" .github scripts mvp_site 2>/dev/null
      expect_exit: 0

  # --- Routing: single field, not the 13-flag OR --------------------------------
  - name: level-up routing consults level_up_session, not a 13-flag OR
    eval:
      kind: shell
      # agents.py routing must reference level_up_session and must NOT OR together
      # the legacy modal flags + rewards_pending as the primary decision.
      # ALSO: rewards_engine.py is_level_up_active / is_level_up_route_active (the real OR
      # routing authority per the v2 execution spec) must delegate to level_up_session,
      # not re-derive from legacy pending signals.
      command: >
        grep -q "level_up_session" mvp_site/agents.py
        && ! grep -nE "rewards_pending.*level_up_available" mvp_site/agents.py | grep -q .
        && grep -qE "def is_level_up_active|def is_level_up_route_active" mvp_site/rewards_engine.py
        && grep -A 5 "def is_level_up_active" mvp_site/rewards_engine.py | grep -q "is_review_open"
        && grep -A 5 "def is_level_up_route_active" mvp_site/rewards_engine.py | grep -q "is_review_open"
      expect_exit: 0

  # --- ZFC: availability is model-granted, never XP-threshold computed -----------
  - name: level-up availability is not derived from level_from_xp thresholds
    eval:
      kind: shell
      command: >
        ! grep -rnE "level_up.*level_from_xp|level_from_xp.*>.*level\b" mvp_site --include=*.py
        | grep -vE "/tests?/|test_|_test|# *allow"
        | grep -q .
      expect_exit: 0

  # --- Server-side synthesis is deleted (BOTH files: world_logic + rewards_engine) ---
  - name: no server_generated planning-choice synthesis in world_logic or rewards_engine
    eval:
      kind: shell
      command: >
        ! grep -rnE "server_generated\s*[=:]\s*True|\"server_generated\"\s*:\s*True" mvp_site/world_logic.py mvp_site/rewards_engine.py
        | grep -q .
      expect_exit: 0

  - name: rewards_engine does not server-synthesize a "Begin Level-Up" planning choice
    eval:
      kind: shell
      command: >
        ! grep -rnE "default_level_up_choices|Begin Level-Up to Level" mvp_site/rewards_engine.py
        | grep -vE "/tests?/|test_|_test"
        | grep -q .
      expect_exit: 0

  # --- XP single-homed -----------------------------------------------------------
  - name: XP is single-homed in experience.current (no xp_current / xp scalar writes)
    eval:
      kind: shell
      command: >
        ! grep -rnE "\b(xp_current|xp_total)\b\s*[:=]" mvp_site --include=*.py
        | grep -vE "experience|/tests?/|test_|_test|migration"
        | grep -q .
      expect_exit: 0

  # --- Single writer: the world_logic second writer is deleted (cold-review) ----
  - name: world_logic._build_level_up_session_update (the source=server second writer) is deleted
    eval:
      kind: shell
      command: >
        ! grep -rn "_build_level_up_session_update" mvp_site --include=*.py
        | grep -vE "/tests?/|test_|_test"
        | grep -q .
      expect_exit: 0

  - name: no production code stamps a level_up_session source of "server"
    eval:
      kind: shell
      command: >
        ! grep -rnE "source.{0,12}[:=].{0,4}[\"']server[\"']" mvp_site --include=*.py
        | grep -iE "level_up|session"
        | grep -vE "/tests?/|test_|_test"
        | grep -q .
      expect_exit: 0

  # --- Behavioral: the regression suite for the v2 contract passes ---------------
  - name: organic and god-mode level-up regression suite passes (real, no mock-mode)
    eval:
      kind: shell
      # The implementation must provide a runnable regression that proves:
      # organic 2->3->4 commits immediately, god-mode set-level does not revert,
      # finish never fails open, and no stale lifecycle flags survive a transition.
      command: >
        test -f mvp_site/tests/test_level_up_immediate_commit.py
        && TESTING_AUTH_BYPASS=true ./run_tests.sh mvp_site/tests/test_level_up_immediate_commit.py
      expect_exit: 0

  - name: atomic co-write — sheet and session are written by one reducer entrypoint
    eval:
      kind: shell
      # The commit path must funnel through a single reducer that writes both
      # player_character_data and level_up_session; no separate level writer.
      command: >
        test -f mvp_site/tests/test_level_up_atomic_cowrite.py
        && TESTING_AUTH_BYPASS=true ./run_tests.sh mvp_site/tests/test_level_up_atomic_cowrite.py
      expect_exit: 0

  - name: partial-sheet level-up MERGES into PCD (does not wipe HP/XP/inventory)
    eval:
      kind: shell
      # A level-up whose sheet delta omits unrelated fields must preserve them
      # (the god_mode_level_up.py:171-186 merge bug must not recur organically).
      command: >
        test -f mvp_site/tests/test_level_up_partial_sheet_merge.py
        && TESTING_AUTH_BYPASS=true ./run_tests.sh mvp_site/tests/test_level_up_partial_sheet_merge.py
      expect_exit: 0
