<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone MVP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f3f3f3;
            padding: 20px;
        }

        .header {
            background-color: #131921;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff9900;
        }

        .search-container {
            flex: 1;
            display: flex;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px 0 0 4px;
            font-size: 14px;
        }

        .search-btn {
            padding: 10px 20px;
            background-color: #febd69;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            padding: 10px;
        }

        .cart-icon svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .cart-badge {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ff9900;
            color: #131921;
            font-size: 12px;
            font-weight: bold;
            min-width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            color: #0f1111;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .placeholder {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            color: #666;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" aria-label="Amazon Clone">Amazon Clone</div>
        <div class="search-container">
            <input
                type="search"
                class="search-input"
                placeholder="Search products..."
                aria-label="Search products"
                id="search-input"
            >
            <button class="search-btn" aria-label="Search">Search</button>
        </div>
        <div class="cart-icon" role="button" aria-label="Shopping cart" aria-haspopup="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14.6c0-.4.1-.8.4-1 .3-.3.7-.4 1.1-.4h13l1.5 6h-16.1l1.1-4.6zm-.9-1.5c.2-.6 1-1 1.7-1h13.4c.7 0 1.2.4 1.4 1l1.7 8.5c.1.4.1.8-.1 1.2-.1.4-.4.6-.7.8l-1.7.9c-.4.2-.9.2-1.3-.1-.4-.3-.5-.8-.4-1.3l.3-1.5H5.2l.1.5c.1.5.4.8.8 1 .4.2.9.1 1.2-.2.1-.2.2-.4.2-.6z"/>
            </svg>
            <span class="cart-badge" id="cart-count" aria-live="polite">0</span>
        </div>
    </header>

    <main class="container">
        <h1>Products</h1>
        <div class="product-grid" id="product-grid">
            <div class="placeholder">Starter - implement features here</div>
        </div>
    </main>

</body>
</html>
